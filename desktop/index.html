<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connection Hub R4</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .section {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      flex: 1 1 300px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
    }

    /* Text Share Section */
    .text-share textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      font-size: 16px;
      resize: vertical;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .status-log {
      font-size: 0.85em;
      color: #666;
      margin-top: 8px;
      min-height: 16px;
    }

    /* File Share Section */
    .file-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      align-items: center;
    }

    .file-item .file-info {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .file-item .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .file-size {
      font-size: 0.75em;
      color: #999;
    }

    .file-item button {
      margin-left: 8px;
      background: #dc3545;
    }

    .file-item button.download-btn {
      background: #28a745;
    }

    .file-share .buttons {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-share .buttons .status-log {
      flex: 1;
      font-weight: bold;
      margin-top: 0;
    }

    .btn-danger {
      background: #dc3545 !important;
    }

    .btn-secondary {
      background: #6c757d !important;
    }

    /* Upload progress bar */
    .upload-progress-wrap {
      margin-top: 8px;
      display: none;
    }

    .upload-progress-wrap.visible {
      display: block;
    }

    .upload-progress-bar-bg {
      background: #e0e0e0;
      border-radius: 4px;
      height: 10px;
      overflow: hidden;
    }

    .upload-progress-bar {
      background: #007BFF;
      height: 100%;
      width: 0%;
      transition: width 0.15s ease;
      border-radius: 4px;
    }

    .upload-progress-label {
      font-size: 0.78em;
      color: #555;
      margin-top: 3px;
    }

    /* Buttons */
    button {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #007BFF;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="section text-share">
      <h2>Text Share</h2>
      <textarea id="sharedText" placeholder="Enter your text here..."></textarea>
      <div class="status-log" id="textLog">Waiting for sync...</div>
    </div>

    <div class="section file-share">
      <h2>File Share</h2>
      <div class="file-list" id="fileList"></div>
      <div class="upload-progress-wrap" id="uploadProgressWrap">
        <div class="upload-progress-bar-bg">
          <div class="upload-progress-bar" id="uploadProgressBar"></div>
        </div>
        <div class="upload-progress-label" id="uploadProgressLabel"></div>
      </div>
      <div class="buttons" style="margin-top: 10px;">
        <button onclick="uploadFile()">Upload</button>
        <button class="btn-secondary" onclick="downloadAll()">Download All</button>
        <button class="btn-danger" onclick="deleteAll()">Delete All</button>
        <span class="status-log" id="fileLog">Ready</span>
      </div>
    </div>
  </div>

  <script>
    // tracker timestamps
    let lastTextTs = 0;
    let lastFilesTs = 0;
    let isUploading = false;

    let typingTimer;
    const textArea = document.getElementById('sharedText');
    const textLog = document.getElementById('textLog');
    const fileLog = document.getElementById('fileLog');
    const fileList = document.getElementById('fileList');
    const uploadProgressWrap = document.getElementById('uploadProgressWrap');
    const uploadProgressBar = document.getElementById('uploadProgressBar');
    const uploadProgressLabel = document.getElementById('uploadProgressLabel');

   // Encode UTF-8 filename to base64url
  function encodeFilename(name) {
    const bytes = new TextEncoder().encode(name);
    const binString = Array.from(bytes, byte => String.fromCharCode(byte)).join('');
    return btoa(binString).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  // Decode base64url to original filename
  function decodeFilename(encoded) {
    const b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    const pad = b64.length % 4 === 0 ? '' : '===='.slice(b64.length % 4);
    const binString = atob(b64 + pad);
  
    const bytes = new Uint8Array(binString.length);
    for (let i = 0; i < binString.length; i++) {
      bytes[i] = binString.charCodeAt(i);
    }
    return new TextDecoder().decode(bytes);
  }

    // Format file size for display
    function formatSize(bytes) {
      if (bytes === undefined || bytes === null) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KiB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MiB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GiB';
    }

    // 1. Text autosave, wait 0.5s before sending to server
    textArea.addEventListener('input', () => {
      clearTimeout(typingTimer);
      textLog.textContent = 'Typing...';

      typingTimer = setTimeout(async () => {
        textLog.textContent = 'Saving...';
        try {
          const response = await fetch('/api/text', {
            method: 'POST',
            body: textArea.value
          });
          if (response.ok) {
            const data = await response.json();
            lastTextTs = data.ts;
            textLog.textContent = 'Saved: ' + new Date().toLocaleTimeString();
          }
        } catch (e) {
          textLog.textContent = 'Save failed!';
        }
      }, 500);
    });

    // 2. Status sync every 3 seconds
    async function syncState() {
      try {
        // fetch state
        const response = await fetch(`/api/state?text_ts=${lastTextTs}&files_ts=${lastFilesTs}`);
        if (!response.ok) return;
        const state = await response.json();

        // update text
        if (state.text && state.text.updated) {
          textArea.value = state.text.data;
          lastTextTs = state.text.ts;
          textLog.textContent = 'Synced: ' + new Date().toLocaleTimeString();
        }

        // skip overwrite if uploading
        if (!isUploading && state.files && state.files.updated) {
          renderFiles(state.files.data);
          lastFilesTs = state.files.ts;
          fileLog.textContent = 'Synced: ' + new Date().toLocaleTimeString();
        }
      } catch (e) {
        console.error("Sync error", e);
      }
    }

    // 3. Render file list
    function renderFiles(files) {
      fileList.innerHTML = '';
      if (!files || files.length === 0) {
        fileList.innerHTML = '<div style="color: #999; text-align: center;">No files uploaded</div>';
        return;
      }

      // files is array of {name: encodedName, size: bytes}
      files.forEach(f => {
        const encoded = f.name;
        const displayName = decodeFilename(encoded);
        const sizeStr = formatSize(f.size);
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <div class="file-info">
            <span class="file-name" title="${displayName}">${displayName}</span>
            <span class="file-size">${sizeStr}</span>
          </div>
          <div>
            <button class="download-btn" onclick="downloadFile('${encoded}')">Download</button>
            <button onclick="deleteFile('${encoded}', '${displayName.replace(/'/g, "\\'")}')">Delete</button>
          </div>
        `;
        fileList.appendChild(item);
      });
    }

    // 4. File upload
    async function uploadFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;

      input.onchange = async () => {
        const selectedFiles = Array.from(input.files);
        if (selectedFiles.length === 0) return;

        // show upload progress
        isUploading = true;
        uploadProgressWrap.classList.add('visible');

        for (let i = 0; i < selectedFiles.length; i++) {
          const file = selectedFiles[i];
          const encodedName = encodeFilename(file.name);

          // show upload progress
          fileLog.textContent = `Uploading ${i + 1}/${selectedFiles.length}: ${file.name}`;
          uploadProgressBar.style.width = '0%';
          uploadProgressLabel.textContent = `0% — ${file.name}`;

          await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/files/upload');

            // show upload progress
            xhr.upload.addEventListener('progress', (e) => {
              if (e.lengthComputable) {
                const pct = Math.round((e.loaded / e.total) * 100);
                uploadProgressBar.style.width = pct + '%';
                uploadProgressLabel.textContent = `${pct}% — ${file.name} (${formatSize(e.loaded)} / ${formatSize(e.total)})`;
              }
            });

            // file upload complete
            xhr.addEventListener('load', () => {
              uploadProgressBar.style.width = '100%';
              resolve();
            });
            xhr.addEventListener('error', reject);

            // file upload
            const formData = new FormData();
            formData.append('file', file);
            formData.append('filename', encodedName);
            xhr.send(formData);
          });
        }

        // hide upload progress
        uploadProgressWrap.classList.remove('visible');
        uploadProgressBar.style.width = '0%';
        isUploading = false;
        fileLog.textContent = 'Upload complete';

        // Force file sync
        lastFilesTs = 0;
        syncState();
      };
      input.click();
    }

    // 5. File download
    function downloadFile(encodedName) {
      const displayName = decodeFilename(encodedName);
      const a = document.createElement('a');
      a.href = `/api/files/download/${encodedName}?name=${encodeURIComponent(displayName)}`; // use base64 to url, original to filename
      a.download = displayName;
      a.click();
    }

    // 6. File delete
    async function deleteFile(encodedName, displayName) {
      if (!confirm(`Delete "${displayName}"?`)) return;
      fileLog.textContent = 'Deleting...';
      await fetch(`/api/files/delete/${encodedName}`, { method: 'DELETE' });
      lastFilesTs = 0;
      syncState();
    }

    // 7. Download all files by zip
    function downloadAll() {
      const items = fileList.querySelectorAll('.file-item');
      if (items.length === 0) {
        alert('No files to download.');
        return;
      }
      if (!confirm(`Download all ${items.length} file(s) as files.zip?`)) return;

      // download as files.zip
      const a = document.createElement('a');
      a.href = '/api/files/download-all';
      a.download = 'files.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 8. Delete all files
    async function deleteAll() {
      const items = fileList.querySelectorAll('.file-item');
      if (items.length === 0) {
        alert('No files to delete.');
        return;
      }
      if (!confirm(`Delete all ${items.length} file(s)?`)) return;
      fileLog.textContent = 'Deleting all...';
      await fetch('/api/files/delete-all', { method: 'DELETE' });
      lastFilesTs = 0;
      syncState();
    }

    // Initial sync, then sync every 3 seconds
    syncState();
    setInterval(syncState, 3000);
  </script>
</body>

</html>
